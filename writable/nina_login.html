    <script>
        (function() {
            const key = 'ospos_sidebar_collapsed';

            const syncForViewport = function() {
                if (window.innerWidth <= 992) {
                    document.documentElement.classList.remove('sidebar-collapsed');
                } else if (localStorage.getItem(key) === '1') {
                    document.documentElement.classList.add('sidebar-collapsed');
                }
            };

            document.addEventListener('DOMContentLoaded', function() {
                const toggle = document.getElementById('neo_sidebar_toggle');
                const mobileToggle = document.getElementById('neo_mobile_sidebar_toggle');
                const mobileBackdrop = document.getElementById('neo_sidebar_backdrop');
                if (!toggle) {
                    return;
                }

                const setExpandedState = function() {
                    toggle.setAttribute('aria-expanded', (!document.documentElement.classList.contains('sidebar-collapsed')).toString());
                };

                toggle.addEventListener('click', function() {
                    if (window.innerWidth <= 992) {
                        return;
                    }

                    document.documentElement.classList.toggle('sidebar-collapsed');
                    localStorage.setItem(key, document.documentElement.classList.contains('sidebar-collapsed') ? '1' : '0');
                    setExpandedState();
                });

                const closeMobileSidebar = function() {
                    document.documentElement.classList.remove('mobile-sidebar-open');
                };

                if (mobileToggle) {
                    mobileToggle.addEventListener('click', function() {
                        if (window.innerWidth > 992) {
                            return;
                        }
                        document.documentElement.classList.toggle('mobile-sidebar-open');
                    });
                }

                if (mobileBackdrop) {
                    mobileBackdrop.addEventListener('click', closeMobileSidebar);
                }

                document.addEventListener('keydown', function(event) {
                    if (event.key === 'Escape' && window.innerWidth <= 992) {
                        closeMobileSidebar();
                    }
                });

                document.querySelectorAll('.neo-global-menu-item').forEach(function(link) {
                    link.addEventListener('click', function() {
                        if (window.innerWidth <= 992) {
                            closeMobileSidebar();
                        }
                    });
                });

                window.addEventListener('resize', function() {
                    syncForViewport();
                    setExpandedState();
                    if (window.innerWidth > 992) {
                        document.documentElement.classList.remove('mobile-sidebar-open');
                    }
                });

                syncForViewport();
                setExpandedState();
            });
        })();
    </script>

<div id="pos-logout-confirm" class="pos-modal-overlay" aria-hidden="true">
    <div class="pos-modal" role="dialog" aria-modal="true" aria-labelledby="pos-logout-confirm-title">
        <div class="pos-modal__head" id="pos-logout-confirm-title">Confirm logout</div>
        <div class="pos-modal__body">Are you sure you want to logout?</div>
        <div class="pos-modal__actions">
            <button type="button" class="pos-modal-btn pos-modal-btn--ghost" id="pos-logout-confirm-cancel">Cancel</button>
            <button type="button" class="pos-modal-btn pos-modal-btn--danger-solid" id="pos-logout-confirm-continue">Logout</button>
        </div>
    </div>
</div>

<script>
(function() {
    var logoutOverlay = document.getElementById('pos-logout-confirm');
    if (!logoutOverlay) {
        return;
    }

    if (logoutOverlay.parentNode !== document.body) {
        document.body.appendChild(logoutOverlay);
    }

    var logoutCancelBtn = document.getElementById('pos-logout-confirm-cancel');
    var logoutContinueBtn = document.getElementById('pos-logout-confirm-continue');
    var pendingLogoutHref = null;

    var closeLogoutModal = function() {
        logoutOverlay.classList.remove('is-open');
        logoutOverlay.setAttribute('aria-hidden', 'true');
        pendingLogoutHref = null;
    };

    var openLogoutModal = function(href) {
        if (!href) {
            return false;
        }
        pendingLogoutHref = href;
        logoutOverlay.classList.add('is-open');
        logoutOverlay.setAttribute('aria-hidden', 'false');
        return false;
    };

    window.osposConfirmLogout = function(link) {
        var href = link.getAttribute('data-logout-url') || link.getAttribute('href');
        return openLogoutModal(href);
    };

    document.querySelectorAll('.pos-logout-link').forEach(function(link) {
        if (link.getAttribute('onclick')) {
            return;
        }
        link.addEventListener('click', function(event) {
            event.preventDefault();
            openLogoutModal(link.getAttribute('data-logout-url') || link.getAttribute('href'));
        });
    });

    if (logoutContinueBtn) {
        logoutContinueBtn.addEventListener('click', function() {
            if (!pendingLogoutHref) {
                closeLogoutModal();
                return;
            }
            window.location.assign(pendingLogoutHref);
        });
    }

    if (logoutCancelBtn) {
        logoutCancelBtn.addEventListener('click', closeLogoutModal);
    }

    logoutOverlay.addEventListener('click', function(event) {
        if (event.target === logoutOverlay) {
            closeLogoutModal();
        }
    });

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && logoutOverlay.classList.contains('is-open')) {
            closeLogoutModal();
        }
    });
})();
</script>
